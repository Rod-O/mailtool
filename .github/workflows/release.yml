name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - rid: osx-arm64
            os: macos-latest
            artifact: mailtool
          - rid: osx-x64
            os: macos-latest
            artifact: mailtool
          - rid: linux-x64
            os: ubuntu-latest
            artifact: mailtool
          - rid: win-x64
            os: windows-latest
            artifact: mailtool.exe

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: >
          dotnet publish MailTool.csproj
          -c Release
          -r ${{ matrix.rid }}
          -p:PublishSingleFile=true
          --self-contained false
          -o out/${{ matrix.rid }}

      - name: Rename artifact
        shell: bash
        run: mv out/${{ matrix.rid }}/${{ matrix.artifact }} out/${{ matrix.rid }}/mailtool-${{ matrix.rid }}${{ matrix.rid == 'win-x64' && '.exe' || '' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mailtool-${{ matrix.rid }}
          path: out/${{ matrix.rid }}/mailtool-${{ matrix.rid }}*

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/mailtool-*
          generate_release_notes: true
